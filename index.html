<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Multi-Pôles — Simulateur PLV 3D</title>
<style>
:root{--bg:#fff;--ink:#171717;--line:#eee}
body{margin:0;font-family:sans-serif;background:var(--bg);color:var(--ink);height:100vh;display:flex;flex-direction:column;align-items:center;padding:20px}
.viewer{width:100%;max-width:600px;height:400px;background:#f9f9f9;border:1px solid #ddd;border-radius:12px;display:flex;flex-direction:column;align-items:center;justify-content:center;margin-bottom:20px;position:relative}
.shelf{width:70%;height:10px;background:#333;margin:8px 0;border-radius:2px}
.controls{display:flex;gap:10px}
button{padding:12px 24px;border-radius:6px;cursor:pointer;border:1px solid #000;background:#000;color:#fff}
</style>
</head>
<body>
    <h1>Modèle 4 Étagères</h1>
    <div class="viewer">
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
    </div>
    <div class="controls">
        <button onclick="alert('Modèle validé et banque image OK')">VALIDER ET ENVOYER EN BANQUE IMAGE</button>
    </div>
</body>
</html>
