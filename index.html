<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modèle PLV 4 Étagères</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; background: #fff; }
        
        /* Modèle 3D inspiré de votre PLV réelle */
        .plv-stand {
            width: 220px;
            height: 400px;
            background: #fff;
            border: 2px solid #000;
            position: relative;
            transform: perspective(600px) rotateY(-10deg);
            display: flex;
            flex-direction: column;
            justify-content: space-evenly;
            align-items: center;
            padding: 20px 0;
            box-shadow: 15px 15px 0px rgba(0,0,0,0.1);
        }

        /* 4 Étagères visibles */
        .shelf {
            width: 85%;
            height: 12px;
            background: #333;
            border-bottom: 4px solid #000;
            border-radius: 2px;
        }

        .controls { margin-top: 50px; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #000; color: #fff; border: none; border-radius: 4px; }
    </style>
</head>
<body>
    <h1>Modèle PLV : 4 Étagères</h1>
    <div class="plv-stand">
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
    </div>
    <div class="controls">
        <button onclick="alert('Modèle archivé')">VALIDER ET ENVOYER</button>
    </div>
</body>
</html>
