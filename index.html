<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Multipoles 3D Studio - Mockup A001</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; background: #f4f7fb; margin: 0; padding: 20px; color: #1a202c; }
        .app-container { display: flex; gap: 20px; max-width: 1200px; margin: 0 auto; }
        .sidebar { width: 300px; background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; }
        .main-content { flex-grow: 1; display: flex; flex-direction: column; gap: 20px; }
        .row-display { background: white; padding: 20px; border-radius: 12px; border: 1px solid #e2e8f0; display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        .view-box { border: 1px solid #e2e8f0; height: 200px; display: flex; align-items: center; justify-content: center; background: #fdfdfd; font-size: 12px; color: #718096; }
        .input-group { margin-bottom: 15px; }
        label { display: block; font-size: 12px; font-weight: 600; margin-bottom: 5px; }
        input { width: 100%; padding: 8px; border: 1px solid #cbd5e0; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #002d72; color: white; border: none; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="app-container">
    <aside class="sidebar">
        <h3>PLV 4 ÉTAGÈRES – Réf. A001</h3>
        <div class="input-group"><label>Hauteur totale</label><input value="1600"></div>
        <div class="input-group"><label>Largeur</label><input value="700"></div>
        <div class="input-group"><label>Profondeur</label><input value="450"></div>
        <button>Appliquer</button>
    </aside>
    <main class="main-content">
        <div class="row-display">
            <div class="view-box">Face</div><div class="view-box">3/4</div><div class="view-box">Côté</div><div class="view-box">Arrière</div>
        </div>
        <div class="row-display">
            <div class="view-box">Face (Produits)</div><div class="view-box">3/4 (Produits)</div><div class="view-box">Côté (Produits)</div><div class="view-box">Arrière (Produits)</div>
        </div>
        <button onclick="alert('Modèle A001 validé et envoyé en banque image.')" style="width: 200px;">Valider le modèle</button>
    </main>
</div>
</body>
</html>
