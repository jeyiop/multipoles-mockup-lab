<!doctype html>
<html lang="fr">
<head>
<meta charset="utf-8" />
<title>PLV 3D - Setup</title>
<style>
    body { margin: 0; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; background: #eee; }
    .container { display: flex; gap: 40px; align-items: center; }
    .controls { display: flex; flex-direction: column; gap: 10px; }
    button { padding: 15px 25px; font-size: 20px; cursor: pointer; }
    .stage { perspective: 800px; }
    .plv { width: 150px; height: 300px; background: #ddd; transform-style: preserve-3d; transform: rotateY(-20deg); position: relative; }
    .shelf { position: absolute; width: 100%; height: 5px; background: #999; bottom: var(--y); }
</style>
</head>
<body>
<div class="container">
    <div class="controls">
        <button onclick="change('shelves', 1)">Étagères +</button>
        <button onclick="change('shelves', -1)">Étagères -</button>
    </div>
    <div class="stage"><div class="plv" id="plv"></div></div>
</div>
<script>
    let shelves = 3;
    function change(k, v) { shelves = Math.max(1, Math.min(6, shelves + v)); render(); }
    function render() {
        const plv = document.getElementById('plv'); plv.innerHTML = '';
        for(let i=1; i<=shelves; i++) {
            const s = document.createElement('div');
            s.className = 'shelf'; s.style.setProperty('--y', (i * 60) + 'px');
            plv.appendChild(s);
        }
    }
    render();
</script>
</body>
</html>
