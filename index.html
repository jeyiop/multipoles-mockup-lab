<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mockup PLV</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root { --color-bg: #ffffff; --color-text: #171717; --color-border: rgba(0, 0, 0, 0.08); }
        body { font-family: 'Geist', sans-serif; color: var(--color-text); margin: 0; padding: 40px; }
        .container { max-width: 900px; margin: 0 auto; }
        header { padding-bottom: 20px; border-bottom: 1px solid var(--color-border); margin-bottom: 40px; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }
        .card { padding: 24px; border: 1px solid var(--color-border); border-radius: 8px; }
        .plv-preview { height: 300px; background: #e0e0e0; display: flex; align-items: center; justify-content: center; border-radius: 4px; font-weight: 600; margin-bottom: 16px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Configuration PLV</h1>
        </header>
        <div class="grid">
            <div class="card">
                <div class="plv-preview">PROTOTYPE PLV 3D</div>
                <h3>Détails du modèle</h3>
                <p>Structure : Carton renforcé / Polypropylène</p>
                <p>Format : Stand Présentoir 180cm</p>
            </div>
            <div class="card">
                <h3>Options de personnalisation</h3>
                <ul>
                    <li>Finition : Mat / Brillant</li>
                    <li>Impression : Quadri Recto/Verso</li>
                    <li>Accessoires : Crochets renforcés</li>
                    <li>Quantité : 50 unités</li>
                </ul>
                <button style="margin-top:20px; padding: 10px 20px; background: #000; color: #fff; border:none; border-radius: 4px; cursor: pointer;">Valider la configuration</button>
            </div>
        </div>
    </div>
</body>
</html>
