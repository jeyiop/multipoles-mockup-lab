<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Modèle PLV 4 Étagères</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; padding: 40px; }
        /* Style Présentoir */
        .plv-stand { 
            width: 200px; height: 350px; border: 4px solid #333; 
            border-radius: 4px; position: relative; background: #eee;
            display: flex; flex-direction: column; align-items: center; justify-content: space-around;
            padding: 20px 0; box-shadow: 10px 10px 0 #ccc;
        }
        .shelf { width: 160px; height: 12px; background: #444; border-radius: 2px; }
        .controls { margin-top: 40px; }
        button { padding: 15px 30px; font-size: 16px; cursor: pointer; background: #000; color: #fff; border: none; }
    </style>
</head>
<body>
    <h1>Modèle PLV : 4 Étagères</h1>
    <div class="plv-stand">
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
    </div>
    <div class="controls">
        <button onclick="alert('Modèle archivé')">VALIDER ET ENVOYER</button>
    </div>
</body>
</html>
