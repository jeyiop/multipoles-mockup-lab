<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interface Mockup</title>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@300;400;500;600&family=Geist+Mono:wght@400;500&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg: #ffffff;
            --color-text: #171717;
            --color-gray: #4d4d4d;
            --color-border: rgba(0, 0, 0, 0.08);
        }
        body {
            font-family: 'Geist', sans-serif;
            color: var(--color-text);
            background: var(--color-bg);
            margin: 0;
            padding: 40px;
            line-height: 1.5;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        header {
            padding-bottom: 40px;
            border-bottom: 1px solid var(--color-border);
            margin-bottom: 40px;
        }
        h1 {
            font-size: 32px;
            letter-spacing: -1.28px;
            margin: 0;
        }
        .card {
            background: #ffffff;
            padding: 24px;
            border-radius: 8px;
            box-shadow: 0 0 0 1px var(--color-border), 0 2px 2px rgba(0,0,0,0.04);
            margin-bottom: 24px;
        }
        .placeholder-box {
            height: 150px;
            background: #fafafa;
            border: 1px solid var(--color-border);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--color-gray);
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Mockup Interface</h1>
        </header>
        <div class="card">
            <h3>Content Area</h3>
            <div class="placeholder-box">Data Visualization / Preview</div>
        </div>
        <div class="card">
            <h3>Details</h3>
            <p>Information goes here. Focus on clarity and hierarchy.</p>
        </div>
    </div>
</body>
</html>
