<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>PLV 4 Étagères - Modèle A001</title>
    <style>
        body { background: #e5e5e5; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .stand {
            width: 250px; height: 450px;
            background: #fff;
            border: 2px solid #333;
            position: relative;
            transform: perspective(1000px) rotateY(-15deg);
            box-shadow: 20px 20px 0 rgba(0,0,0,0.1);
            display: flex; flex-direction: column; align-items: center;
            padding-top: 50px;
        }
        /* Fronton */
        .header { width: 90%; height: 60px; background: #222; margin-bottom: 20px; border-radius: 4px; }
        /* 4 Étagères trapézoïdales */
        .shelf {
            width: 85%; height: 10px; background: #444; margin: 25px 0;
            transform: rotateX(20deg); box-shadow: 0 5px 0 #222;
        }
        .controls { position: absolute; bottom: 20px; left: 20px; }
    </style>
</head>
<body>
    <div class="stand">
        <div class="header"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
        <div class="shelf"></div>
    </div>
    <div class="controls">
        <button onclick="alert('Modèle A001 validé')">VALIDER</button>
    </div>
</body>
</html>
